spring:
  datasource:
    url: jdbc:h2:file:./data/scriptoria-local;MODE=PostgreSQL;DATABASE_TO_LOWER=TRUE;DEFAULT_NULL_ORDERING=HIGH
    username: sa
    password:
    driver-class-name: org.h2.Driver
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.H2Dialect
        format_sql: true
  h2:
    console:
      enabled: true
      path: /h2-console

# local dev fallback secrets
jwt:
  secret: ${JWT_SECRET:scriptoria-local-dev-secret-key-32-bytes-minimum!}
  expiration-ms: 86400000
