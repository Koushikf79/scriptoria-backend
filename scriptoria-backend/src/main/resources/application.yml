server:
  port: 8080

spring:
  application:
    name: scriptoria-backend
  profiles:
    default: ${SPRING_PROFILES_DEFAULT:local}
  # Allow long-running AI requests (120+ scene scripts take time)
  mvc:
    async:
      request-timeout: 300000   # 5 minutes
  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5432/scriptoria}
    username: ${DB_USERNAME:postgres}
    password: ${DB_PASSWORD:postgres}
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true

# ─── OpenRouter ───────────────────────────────────────────────────────────────
openrouter:
  api-key: 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
  base-url: https://openrouter.ai/api/v1
  model: openai/gpt-oss-20b:nitro
  max-completion-tokens: 8192
  top-p: 0.95

  # Per-feature temperature tuning (quality-first)
  # Script/Emotion/Budget → low temp = consistent structured JSON
  # Storyboard → higher temp = creative cinematic variety
  temperature-analysis: 0.2       # script analysis, emotion, budget
  temperature-storyboard: 0.85    # director mode — wants creative variation

  reasoning-effort: high          # upgraded from medium → best output quality

  # Chunking — for 120+ scene scripts split into larger, overlapping chunks
  chunk-size-chars: 10000         # bigger chunks = better scene context per call
  max-retries: 2                  # retry once on transient failures

# ─── CORS ─────────────────────────────────────────────────────────────────────
cors:
  allowed-origins:
    - "http://localhost:*"
    - "http://127.0.0.1:*"

# ─── Logging ──────────────────────────────────────────────────────────────────
logging:
  level:
    com.scriptoria: DEBUG
    org.springframework.web: INFO
  pattern:
    console: "%d{HH:mm:ss} [%thread] %-5level %logger{36} - %msg%n"

# ─── SpringDoc / Swagger ──────────────────────────────────────────────────────
springdoc:
  api-docs:
    path: /api-docs
  swagger-ui:
    path: /swagger-ui.html
    display-request-duration: true

jwt:
  secret: ${JWT_SECRET:scriptoria-super-secret-key-change-in-production-min-256-bits}
  expiration-ms: 86400000
